<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Water AI – Smart AI Assistant</title>
<meta name="description" content="Water AI is a fast, intelligent AI chatbot with real-time streaming, dataset-aware search, and a clean, focused interface.">
<meta name="theme-color" content="#0EA5E9">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">

<!-- Open Graph -->
<meta property="og:title" content="Water AI – Smart AI Assistant">
<meta property="og:description" content="A fast, intelligent AI chatbot with real-time streaming and a clean interface.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Water AI",
  "applicationCategory": "AI Chatbot",
  "operatingSystem": "Any browser"
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app" id="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Chat history">
    <div class="sidebar-header">
      <button class="brand" id="brandBtn" aria-label="Water AI home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2C12 2 5 10.5 5 15.5C5 19.6 8.1 22 12 22C15.9 22 19 19.6 19 15.5C19 10.5 12 2 12 2Z" fill="currentColor"/></svg>
        </span>
        <span class="brand-name">Water AI</span>
      </button>
      <button class="icon-btn" id="newChatBtn" aria-label="New chat" title="New chat">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sidebar-search">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="chatSearch" placeholder="Search chats" aria-label="Search chats">
    </div>

    <nav class="chat-list" id="chatList" aria-label="Chat list"></nav>

    <div class="sidebar-footer">
      <button class="icon-btn full" id="importBtn" title="Import chats">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Import</span>
      </button>
      <button class="icon-btn full" id="exportAllBtn" title="Export all chats">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Export</span>
      </button>
      <button class="icon-btn full" id="themeToggle" title="Toggle theme">
        <svg viewBox="0 0 24 24" width="16" height="16" id="themeIcon"><path d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.4 6.4l-1.4-1.4M7 7L5.6 5.6m12.8 0L17 7M7 17l-1.4 1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span>Theme</span>
      </button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
  </aside>

  <button class="sidebar-scrim" id="sidebarScrim" aria-hidden="true"></button>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M9 4v16" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="topbar-title">
        <span id="currentChatTitle">New chat</span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="pinChatBtn" aria-label="Pin chat" title="Pin chat">
          <svg viewBox="0 0 24 24" width="18" height="18" id="pinIcon"><path d="M12 2l1.5 5.5L19 9l-4.5 3L16 18l-4-3.5L8 18l1.5-6L5 9l5.5-1.5L12 2z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="renameChatBtn" aria-label="Rename chat" title="Rename chat">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="deleteChatBtn" aria-label="Delete chat" title="Delete chat">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 7h16M9 7V4h6v3m-8 0l1 13a2 2 0 002 2h4a2 2 0 002-2l1-13" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <section class="chat-scroll" id="chatScroll" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <div class="empty-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2C12 2 5 10.5 5 15.5C5 19.6 8.1 22 12 22C15.9 22 19 19.6 19 15.5C19 10.5 12 2 12 2Z" fill="currentColor"/></svg>
        </div>
        <h1>Water AI</h1>
        <p>Ask anything. I'll check the knowledge base first, then stream a response from the model.</p>
        <div class="suggestion-grid" id="suggestionGrid">
          <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
            <strong>Explain a concept</strong>
            <span>Quantum computing, simply</span>
          </button>
          <button class="suggestion-card" data-prompt="Write a Python function to reverse a linked list">
            <strong>Write code</strong>
            <span>Reverse a linked list in Python</span>
          </button>
          <button class="suggestion-card" data-prompt="Draft a short professional email declining a meeting">
            <strong>Draft a message</strong>
            <span>Politely decline a meeting</span>
          </button>
          <button class="suggestion-card" data-prompt="Give me a 5-day beginner workout plan">
            <strong>Plan something</strong>
            <span>5-day beginner workout</span>
          </button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
    </section>

    <div class="composer-wrap">
      <div class="composer" id="composer">
        <button class="icon-btn" id="attachBtn" aria-label="Attach file" title="Attach file">
          <svg viewBox="0 0 24 24" width="19" height="19"><path d="M21 11.5l-8.5 8.5a4.5 4.5 0 01-6.4-6.4L14.6 5a3 3 0 014.2 4.2l-8.4 8.4a1.5 1.5 0 01-2.1-2.1l7.8-7.8" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input type="file" id="fileInput" hidden multiple>
        <div class="composer-input-area">
          <div id="attachmentChips" class="attachment-chips"></div>
          <textarea id="promptInput" placeholder="Message Water AI..." rows="1" aria-label="Message input"></textarea>
        </div>
        <button class="icon-btn" id="voiceBtn" aria-label="Voice input" title="Voice input">
          <svg viewBox="0 0 24 24" width="19" height="19"><rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M5 11a7 7 0 0014 0M12 18v4" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button class="send-btn" id="sendBtn" aria-label="Send message" title="Send (Enter)">
          <svg viewBox="0 0 24 24" width="18" height="18" id="sendIcon"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <p class="composer-hint">Water AI can make mistakes. Check important info.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/dataset.js"></script>
<script src="js/provider.js"></script>
<script src="js/app.js"></script>
</body>
</html>
